<section class="container py-5 contato-romantico">
  <div class="row">
    <!-- Formulário -->
    <div class="col-lg-7 mb-5">
      <h2 class="titulo-romantico mb-4">Escreva para Dominique</h2>
      <p class="subtitulo-romantico mb-4">Ela adoraria receber sua mensagem, suas inspirações ou apenas um carinho!</p>

   <form (submit)="onSubmit($event)">

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_autoresponse" value="Recebemos sua mensagem com carinho. Dominique responderá em breve.">

        <div class="mb-3">
          <label class="form-label">Seu nome</label>
          <input type="text" name="nome" class="form-control input-romance" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Seu e-mail</label>
          <input type="email" name="email" class="form-control input-romance" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Sua mensagem</label>
          <textarea name="mensagem" rows="5" class="form-control input-romance" required></textarea>
        </div>

        <button type="submit" class="botao-romance">Enviar com carinho</button>
      </form>
    </div>

    <!-- Contato Alternativo -->
    <div class="col-lg-5 d-flex flex-column justify-content-center align-items-start">
      <h4 class="titulo-romantico mb-4">Redes & Contato direto</h4>
      <ul class="list-unstyled fs-5">
        <li class="mb-3 d-flex align-items-center">
          <i class="bi bi-envelope-fill me-2 text-romance"></i>
          <a href="mailto:dominique.autora@email.com">dominiqueabreu12@gmail.com</a>
        </li>
        <li class="mb-3 d-flex align-items-center">
          <i class="bi bi-instagram me-2 text-romance"></i>
          <a href="https://www.instagram.com/dominique.mota12?utm_source=qr&igsh=d2dodHNhZG9rZTM4" target="_blank">@dominiquemota</a>
        </li>
        <li class="mb-3 d-flex align-items-center">
          <i class="bi bi-whatsapp me-2 text-romance"></i>
          <a href="https://wa.me/5571999999999" target="_blank">(71) 99999-9999</a>
        </li>
      </ul>
    </div>
  </div>
</section>
